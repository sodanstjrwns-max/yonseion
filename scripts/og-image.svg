<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#14243E"/>
      <stop offset="0.6" stop-color="#1B2F4F"/>
      <stop offset="1" stop-color="#0F1C30"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#C9A45E"/>
      <stop offset="0.5" stop-color="#E8D5A8"/>
      <stop offset="1" stop-color="#AE8A4C"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- subtle ring decoration -->
  <circle cx="1020" cy="120" r="220" fill="none" stroke="#AE8A4C" stroke-opacity="0.18" stroke-width="1.5"/>
  <circle cx="1020" cy="120" r="160" fill="none" stroke="#AE8A4C" stroke-opacity="0.12" stroke-width="1"/>
  <circle cx="140" cy="560" r="180" fill="none" stroke="#AE8A4C" stroke-opacity="0.14" stroke-width="1.5"/>
  <!-- ON mark -->
  <circle cx="600" cy="200" r="64" fill="none" stroke="url(#gold)" stroke-width="3"/>
  <text x="600" y="222" font-family="Noto Serif CJK SC" font-size="56" font-weight="700" fill="url(#gold)" text-anchor="middle">온</text>
  <!-- Clinic name -->
  <text x="600" y="360" font-family="Noto Serif CJK SC" font-size="76" font-weight="700" fill="#FAF8F2" text-anchor="middle" letter-spacing="6">연세온치과의원</text>
  <!-- tagline -->
  <text x="600" y="430" font-family="NanumSquare_ac" font-size="30" fill="#C9A45E" text-anchor="middle" letter-spacing="2">치아를 살리는 따뜻한 진심, 부산 동래</text>
  <!-- divider -->
  <rect x="500" y="468" width="200" height="2" fill="url(#gold)"/>
  <!-- domain -->
  <text x="600" y="525" font-family="NanumSquare_ac" font-size="24" fill="#8A93A6" text-anchor="middle" letter-spacing="3">ysondent.com</text>
</svg>
